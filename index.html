<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="container">
    <h1>Weather Dashboard</h1>

    <div class="search-box">
        <input type="text" id="city" placeholder="Enter City">
        <button onclick="getWeather()">Search</button>
    </div>

    <div id="weather"></div>
</div>

<script src="script.js"></script>
</body>
</html>
<style>
    body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#f5f1eb,#e8d8c8);
    font-family:'Segoe UI',sans-serif;
}

.container{
    background:#fffaf5;
    padding:30px;
    border-radius:20px;
    width:450px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    color:#7a4e38;
    margin-bottom:25px;
    font-size:2.5rem;
}

.search-box{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
    border:2px solid #d8c2b0;
    border-radius:10px;
    outline:none;
    font-size:16px;
}

input:focus{
    border-color:#a2674c;
}

button{
    padding:12px 20px;
    background:#a2674c;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#8b563d;
    transform:translateY(-2px);
}

#weather{
    margin-top:25px;
    background:#f0e3d7;
    padding:15px;
    border-radius:12px;
    border-left:5px solid #a2674c;
}

#weather h2{
    color:#7a4e38;
    margin-bottom:10px;
}

#weather p{
    color:#4a3528;
    margin:6px 0;
}
</style>
<script>
    const weatherDiv = document.getElementById("weather");

async function getWeather(){

    const city = document.getElementById("city").value;

    if(city===""){
        alert("Enter a city");
        return;
    }

    try{

        const response = await fetch(
        `https://wttr.in/${city}?format=j1`
        );

        const data = await response.json();

        weatherDiv.innerHTML = `
        <h2>${city}</h2>
        <p>Temperature: ${data.current_condition[0].temp_C} °C</p>
        <p>Humidity: ${data.current_condition[0].humidity}%</p>
        <p>Wind Speed: ${data.current_condition[0].windspeedKmph} km/h</p>
        <p>Condition: ${data.current_condition[0].weatherDesc[0].value}</p>
        `;

    }catch(error){

        weatherDiv.innerHTML =
        "<p>Unable to fetch weather data.</p>";

    }
}
</script>
</html>
